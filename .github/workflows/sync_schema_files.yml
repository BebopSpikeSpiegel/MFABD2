name: Sync JSON Schema Files from MaaFramework

on:
  schedule:
    - cron: '10 0 * * *'  # UTC 00:10 每天运行
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write # 必须：允许创建 PR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-repository:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.repository }}" == "sunyink/MFABD2" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  sync-schema-files:
    needs: check-repository
    if: needs.check-repository.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 在这里列出你需要同步的分支，假设你的开发分支叫 dev
        branch: [main, develop] 
    
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }} # 检出对应的目标分支

      - name: Download JSON schema files from MaaFramework
        run: |
          echo "Syncing for branch: ${{ matrix.branch }}"
          mkdir -p deps/tools

          # 需要同步的 schema 文件清单（须与上游 MaaXYZ/MaaFramework tools/ 实际文件名一致）
          files=(
            interface.schema.json
            interface_import.schema.json
            interface_config.schema.json
            pipeline.schema.json
            custom.action.schema.json
            custom.recognition.schema.json
          )

          base="https://raw.githubusercontent.com/MaaXYZ/MaaFramework/main/tools"
          for f in "${files[@]}"; do
            echo "Downloading $f ..."
            # -f：HTTP 错误（如 404）时退出非 0，避免把 "404: Not Found" 静默写入文件
            # -L：跟随重定向；--retry：抗网络抖动
            curl -fSL --retry 3 -o "deps/tools/$f" "$base/$f"
          done

          echo "Downloaded files."

      # 使用 peter-evans/create-pull-request 自动处理变更检测和 PR 创建
      # 它会自动对比下载的文件和仓库里的文件，如果没有变化，它什么都不做。
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore/update schema files from MaaFramework
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          signoff: false
          # PR 的分支名，加上分支后缀以区分
          branch: chore/sync-schema-${{ matrix.branch }}
          delete-branch: true
          # PR 的目标分支
          base: ${{ matrix.branch }}
          title: 'chore: update schema files from MaaFramework for ${{ matrix.branch }}'
          body: |
            Sync JSON schema files from MaaFramework.
            
            Target Branch: `${{ matrix.branch }}`
            Auto-generated by [create-pull-request](https://github.com/peter-evans/create-pull-request)
          draft: false